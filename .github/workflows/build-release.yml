name: Publish Release
on:
  release:
    types: [published]

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: install dependencies
        run: bun install

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__ # the version will be pulled from tauri.conf.json
          releaseName: "DockDigits v__VERSION__"
          releaseBody: "See the assets below to download the latest version."
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      - name: Generate latest.json
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          # Construct the JSON for Universal macOS
          cat <<EOF > latest.json
          {
            "version": "$VERSION",
            "notes": "See GitHub release for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$(cat src-tauri/target/universal-apple-darwin/release/bundle/dmg/dock-digits_\${VERSION}_universal.dmg.sig)",
                "url": "https://github.com/Murali-Puvvada/dock-digits/releases/download/v$VERSION/dock-digits_\${VERSION}_universal.dmg"
              },
              "darwin-x86_64": {
                "signature": "$(cat src-tauri/target/universal-apple-darwin/release/bundle/dmg/dock-digits_\${VERSION}_universal.dmg.sig)",
                "url": "https://github.com/Murali-Puvvada/dock-digits/releases/download/v$VERSION/dock-digits_\${VERSION}_universal.dmg"
              }
            }
          }
          EOF

      - name: Upload latest.json manually
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
