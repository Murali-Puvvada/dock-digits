name: Release macOS App

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (compute version only, don't release)"
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Ensure workflow is running from main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "❌ Must be triggered from 'main'. Go to Actions → Release macOS App → Run workflow → select 'main'"
            exit 1
          fi
          echo "✅ Running from main"

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Compute next version
        id: semver
        run: |
          EXISTING_TAG=$(git tag --points-at HEAD 'v*.*.*' | head -n 1)
          if [ -n "$EXISTING_TAG" ]; then
            echo "✨ Retry detected — reusing tag $EXISTING_TAG"
            PREV_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname | grep -A 1 "^${EXISTING_TAG}$" | tail -n 1)
            [ "$PREV_TAG" = "$EXISTING_TAG" ] && PREV_TAG=""
            echo "version=${EXISTING_TAG#v}" >> $GITHUB_OUTPUT
            echo "tag=$EXISTING_TAG"          >> $GITHUB_OUTPUT
            echo "last_tag=${PREV_TAG:-v0.0.0}" >> $GITHUB_OUTPUT
            echo "already_bumped=true"        >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "already_bumped=false" >> $GITHUB_OUTPUT
          LAST_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "${LAST_TAG}..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            echo "❌ No commits since last release ($LAST_TAG). Nothing to release."
            exit 1
          fi

          CURRENT="${LAST_TAG#v}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          BUMP="patch"
          while IFS= read -r msg; do
            if echo "$msg" | grep -Eq '^[a-z]+(\(.+\))?!:' || echo "$msg" | grep -q 'BREAKING CHANGE'; then
              BUMP="major"; break
            fi
            if echo "$msg" | grep -Eq '^feat(\(.+\))?:'; then BUMP="minor"; fi
          done <<< "$COMMITS"

          if [ "$BUMP" = "major" ]; then
            NEXT_VERSION="$((MAJOR + 1)).0.0"
          elif [ "$BUMP" = "minor" ]; then
            NEXT_VERSION="${MAJOR}.$((MINOR + 1)).0"
          else
            NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "🚀 Next version: $NEXT_VERSION (bump: $BUMP)"
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEXT_VERSION"    >> $GITHUB_OUTPUT
          echo "last_tag=$LAST_TAG"    >> $GITHUB_OUTPUT

      - name: Generate changelog
        run: |
          LAST_TAG="${{ steps.semver.outputs.last_tag }}"
          if [ "$LAST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%h %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%h %s" "${LAST_TAG}..HEAD")
          fi

          BREAKING=""; FEATURES=""; FIXES=""; OTHER=""
          while IFS= read -r line; do
            HASH=$(echo "$line" | cut -d' ' -f1)
            MSG=$(echo "$line"  | cut -d' ' -f2-)
            if echo "$MSG" | grep -Eq '^[a-z]+(\(.+\))?!:' || echo "$MSG" | grep -q 'BREAKING CHANGE'; then
              BREAKING="${BREAKING}- ${MSG} (${HASH})\n"
            elif echo "$MSG" | grep -Eq '^feat(\(.+\))?:'; then
              FEATURES="${FEATURES}- ${MSG} (${HASH})\n"
            elif echo "$MSG" | grep -Eq '^fix(\(.+\))?:'; then
              FIXES="${FIXES}- ${MSG} (${HASH})\n"
            elif echo "$MSG" | grep -Eq '^(perf|refactor|chore|docs|style|test)(\(.+\))?:'; then
              OTHER="${OTHER}- ${MSG} (${HASH})\n"
            fi
          done <<< "$COMMITS"

          NOTES=""
          [ -n "$BREAKING" ] && NOTES="${NOTES}### ⚠️ Breaking Changes\n${BREAKING}\n"
          [ -n "$FEATURES" ] && NOTES="${NOTES}### ✨ New Features\n${FEATURES}\n"
          [ -n "$FIXES"    ] && NOTES="${NOTES}### 🐛 Bug Fixes\n${FIXES}\n"
          [ -n "$OTHER"    ] && NOTES="${NOTES}### 🔧 Other Changes\n${OTHER}\n"
          [ -z "$NOTES"    ] && NOTES="- Various improvements and updates\n"

          printf "%b" "$NOTES" > /tmp/changelog.md

      - name: Dry run summary
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "🧪 DRY RUN — no changes will be made."
          echo "  Last tag     : ${{ steps.semver.outputs.last_tag }}"
          echo "  Next version : ${{ steps.semver.outputs.tag }}"
          echo ""
          cat /tmp/changelog.md

      - name: Bump version in package.json
        if: ${{ inputs.dry_run == false && steps.semver.outputs.already_bumped != 'true' }}
        run: |
          jq --arg v "${{ steps.semver.outputs.version }}" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      - name: Bump version in tauri.conf.json
        if: ${{ inputs.dry_run == false && steps.semver.outputs.already_bumped != 'true' }}
        run: |
          if jq -e '.package.version' src-tauri/tauri.conf.json > /dev/null 2>&1; then
            jq --arg v "${{ steps.semver.outputs.version }}" '.package.version = $v' src-tauri/tauri.conf.json > tmp.json
          else
            jq --arg v "${{ steps.semver.outputs.version }}" '.version = $v' src-tauri/tauri.conf.json > tmp.json
          fi
          mv tmp.json src-tauri/tauri.conf.json

      - name: Bump version in Cargo.toml
        if: ${{ inputs.dry_run == false && steps.semver.outputs.already_bumped != 'true' }}
        run: |
          sed -i '' "0,/^version = \"[^\"]*\"/s//version = \"${{ steps.semver.outputs.version }}\"/" src-tauri/Cargo.toml

      - name: Commit version bump and push tag
        if: ${{ inputs.dry_run == false && steps.semver.outputs.already_bumped != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: release ${{ steps.semver.outputs.tag }} [skip ci]"
          git tag "${{ steps.semver.outputs.tag }}"
          git push origin main
          git push origin "${{ steps.semver.outputs.tag }}"

      - name: Install frontend dependencies
        if: ${{ inputs.dry_run == false }}
        run: bun install --frozen-lockfile

      - name: Build frontend
        if: ${{ inputs.dry_run == false }}
        run: bun run build

      - name: Build Tauri app
        if: ${{ inputs.dry_run == false }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri build --target universal-apple-darwin

      - name: Find and rename artifacts
        if: ${{ inputs.dry_run == false }}
        id: artifacts
        run: |
          # DMG
          DMG_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -n 1)
          if [ -z "$DMG_PATH" ]; then
            echo "❌ No DMG found."
            exit 1
          fi
          CLEAN_DMG_NAME="DockDigits-${{ steps.semver.outputs.tag }}-universal.dmg"
          CLEAN_DMG_PATH="$(dirname "$DMG_PATH")/${CLEAN_DMG_NAME}"
          mv "$DMG_PATH" "$CLEAN_DMG_PATH"
          echo "dmg_path=$CLEAN_DMG_PATH" >> $GITHUB_OUTPUT
          echo "dmg_name=$CLEAN_DMG_NAME" >> $GITHUB_OUTPUT

          # Updater bundle + signature
          BUNDLE_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -name "*.app.tar.gz" | head -n 1)
          SIG_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -name "*.app.tar.gz.sig" | head -n 1)
          if [ -n "$BUNDLE_PATH" ] && [ -n "$SIG_PATH" ]; then
            CLEAN_BUNDLE_NAME="DockDigits-${{ steps.semver.outputs.tag }}-universal.app.tar.gz"
            CLEAN_BUNDLE_PATH="$(dirname "$BUNDLE_PATH")/${CLEAN_BUNDLE_NAME}"
            mv "$BUNDLE_PATH" "$CLEAN_BUNDLE_PATH"
            echo "bundle_path=$CLEAN_BUNDLE_PATH" >> $GITHUB_OUTPUT
            echo "bundle_name=$CLEAN_BUNDLE_NAME" >> $GITHUB_OUTPUT
            echo "sig=$(cat "$SIG_PATH")" >> $GITHUB_OUTPUT
          else
            echo "⚠️ No updater bundle found — auto-updates will not work for this release."
          fi

      - name: Create GitHub Release
        if: ${{ inputs.dry_run == false }}
        run: |
          TAG="${{ steps.semver.outputs.tag }}"
          DMG_PATH="${{ steps.artifacts.outputs.dmg_path }}"
          DMG_NAME="${{ steps.artifacts.outputs.dmg_name }}"
          BUNDLE_PATH="${{ steps.artifacts.outputs.bundle_path }}"
          BUNDLE_NAME="${{ steps.artifacts.outputs.bundle_name }}"
          SIGNATURE="${{ steps.artifacts.outputs.sig }}"

          # Create the release
          RELEASE_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"Release ${TAG}\",
              \"body\": $(cat /tmp/changelog.md | jq -Rs .),
              \"draft\": false,
              \"prerelease\": false
            }")

          RELEASE_STATUS=$(echo "$RELEASE_RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          RELEASE_BODY=$(echo "$RELEASE_RESPONSE" | grep -v "HTTP_STATUS:")

          if [ "$RELEASE_STATUS" != "201" ]; then
            echo "❌ Failed to create release (HTTP $RELEASE_STATUS)"
            echo "$RELEASE_BODY"
            exit 1
          fi

          UPLOAD_URL=$(echo "$RELEASE_BODY" | jq -r '.upload_url' | sed 's/{?name,label}//')

          # Upload DMG
          curl -s -o /dev/null -w "DMG Upload: %{http_code}\n" -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            "${UPLOAD_URL}?name=${DMG_NAME}" \
            --data-binary "@${DMG_PATH}"

          # Upload updater bundle + latest.json
          if [ -n "$BUNDLE_PATH" ]; then
            curl -s -o /dev/null -w "Bundle Upload: %{http_code}\n" -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              "${UPLOAD_URL}?name=${BUNDLE_NAME}" \
              --data-binary "@${BUNDLE_PATH}"

            BUNDLE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${BUNDLE_NAME}"
            DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            echo "{
              \"version\": \"${TAG#v}\",
              \"notes\": \"See release notes on GitHub\",
              \"pub_date\": \"${DATE}\",
              \"platforms\": {
                \"darwin-aarch64\": { \"signature\": \"${SIGNATURE}\", \"url\": \"${BUNDLE_URL}\" },
                \"darwin-x86_64\":  { \"signature\": \"${SIGNATURE}\", \"url\": \"${BUNDLE_URL}\" }
              }
            }" > /tmp/latest.json

            curl -s -o /dev/null -w "latest.json Upload: %{http_code}\n" -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/json" \
              "${UPLOAD_URL}?name=latest.json" \
              --data-binary "@/tmp/latest.json"
          fi

          echo "✅ Release published!"
          echo "🔗 https://github.com/${{ github.repository }}/releases/tag/${TAG}"
