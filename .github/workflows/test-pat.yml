name: Test PAT

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Debug token and repo
        run: |
          # Print first 4 chars of token so we can confirm it's not empty
          # (safe — doesn't expose the full token)
          echo "Token starts with: ${TOKEN:0:4}"
          echo "Token length: ${#TOKEN}"

          # Check scopes
          echo "--- Scopes ---"
          curl -sI \
            -H "Authorization: Bearer $TOKEN" \
            https://api.github.com \
            | grep -i "x-oauth"

          # List YOUR repos to confirm token works at all
          echo "--- Your public repos ---"
          curl -s \
            -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/user/repos?type=public \
            | jq '[.[].full_name]'
        env:
          TOKEN: ${{ secrets.RELEASE_PAT }}
